<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Snake</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Menlo, Monaco, "Courier New", monospace;
    }
    #terminal {
      padding: 12px;
      background: #000;
      border: 1px solid #1f1f1f;
      border-radius: 6px;
      box-shadow: 0 0 40px rgba(0, 255, 0, 0.08);
    }
    h1 {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ff88;
      font-size: 14px;
      letter-spacing: 2px;
      margin: 0;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>~/ TERMINAL-SNAKE</h1>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script>
    const term = new Terminal({
      cols: 64,
      rows: 24,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      fontSize: 16,
      cursorBlink: false,
      theme: {
        background: '#000000',
        foreground: '#cccccc',
        cursor: '#00ff00',
      },
    });
    term.open(document.getElementById('terminal'));

    const ESC = '\x1b[';
    const HIDE = ESC + '?25l';
    const CLEAR = ESC + '2J' + ESC + 'H';
    const RESET = ESC + '0m';
    const BOLD = ESC + '1m';
    const DIM = ESC + '2m';
    const GREEN = ESC + '32m';
    const BRIGHT_GREEN = ESC + '92m';
    const RED = ESC + '31m';
    const YELLOW = ESC + '33m';
    const CYAN = ESC + '36m';
    const GRAY = ESC + '90m';
    const at = (r, c) => ESC + r + ';' + c + 'H';

    const WIDTH = 40;
    const HEIGHT = 18;
    const TICK_MS = 110;
    const BIG_FOOD_CHANCE = 0.3;
    const BIG_FOOD_TTL = 90;
    const BIG_FOOD_GROWTH = 5;

    let snake, dir, nextDir, food, bigFood, bigFoodTtl, pendingGrowth;
    let score, best = 0, gameOver, started, timer;

    function randEmptyCell() {
      while (true) {
        const f = {
          x: Math.floor(Math.random() * WIDTH),
          y: Math.floor(Math.random() * HEIGHT),
        };
        const onSnake = snake.some(s => s.x === f.x && s.y === f.y);
        const onFood = food && f.x === food.x && f.y === food.y;
        const onBig = bigFood && f.x === bigFood.x && f.y === bigFood.y;
        if (!onSnake && !onFood && !onBig) return f;
      }
    }

    function drawBorder() {
      const top = '+' + '-'.repeat(WIDTH) + '+';
      term.write(at(1, 1) + GRAY + top + RESET);
      for (let r = 0; r < HEIGHT; r++) {
        term.write(at(2 + r, 1) + GRAY + '|' + RESET);
        term.write(at(2 + r, 2 + WIDTH) + GRAY + '|' + RESET);
      }
      term.write(at(HEIGHT + 2, 1) + GRAY + top + RESET);
    }

    function cellAt(x, y) {
      return at(2 + y, 2 + x);
    }

    function clearPlayArea() {
      for (let r = 0; r < HEIGHT; r++) {
        term.write(at(2 + r, 2) + ' '.repeat(WIDTH));
      }
    }

    function drawStatus() {
      const bigInfo = bigFood ? `   ${YELLOW}${BOLD}BIG!${RESET}${YELLOW} ${String(bigFoodTtl).padStart(2, '0')}` : '';
      const line = ` score: ${String(score).padStart(3, '0')}   best: ${String(best).padStart(3, '0')}${bigInfo}   ←↑→↓/WASD  R:restart `;
      term.write(at(HEIGHT + 3, 1) + ESC + '2K' + YELLOW + line + RESET);
    }

    function draw() {
      clearPlayArea();
      term.write(cellAt(food.x, food.y) + RED + BOLD + '*' + RESET);
      if (bigFood) {
        const blink = bigFoodTtl <= 20 && bigFoodTtl % 2 === 0;
        const color = blink ? RED + BOLD : YELLOW + BOLD;
        term.write(cellAt(bigFood.x, bigFood.y) + color + 'O' + RESET);
      }
      snake.forEach((s, i) => {
        const ch = i === 0 ? '@' : 'o';
        const color = i === 0 ? BRIGHT_GREEN + BOLD : GREEN;
        term.write(cellAt(s.x, s.y) + color + ch + RESET);
      });
      drawStatus();
    }

    function trySpawnBigFood() {
      if (bigFood) return;
      if (Math.random() < BIG_FOOD_CHANCE) {
        bigFood = randEmptyCell();
        bigFoodTtl = BIG_FOOD_TTL;
      }
    }

    function init() {
      snake = [
        { x: 10, y: 9 },
        { x: 9, y: 9 },
        { x: 8, y: 9 },
      ];
      dir = { x: 1, y: 0 };
      nextDir = dir;
      score = 0;
      pendingGrowth = 0;
      bigFood = null;
      bigFoodTtl = 0;
      gameOver = false;
      started = true;
      food = randEmptyCell();
      term.write(HIDE + CLEAR);
      drawBorder();
      draw();
      if (timer) clearInterval(timer);
      timer = setInterval(tick, TICK_MS);
    }

    function tick() {
      if (gameOver) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (
        head.x < 0 || head.x >= WIDTH ||
        head.y < 0 || head.y >= HEIGHT ||
        snake.some(s => s.x === head.x && s.y === head.y)
      ) {
        return end();
      }

      if (bigFood) {
        bigFoodTtl--;
        if (bigFoodTtl <= 0) bigFood = null;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > best) best = score;
        food = randEmptyCell();
        trySpawnBigFood();
      } else if (bigFood && head.x === bigFood.x && head.y === bigFood.y) {
        score += BIG_FOOD_GROWTH;
        if (score > best) best = score;
        pendingGrowth += BIG_FOOD_GROWTH - 1;
        bigFood = null;
      } else if (pendingGrowth > 0) {
        pendingGrowth--;
      } else {
        snake.pop();
      }
      draw();
    }

    function end() {
      gameOver = true;
      clearInterval(timer);
      const lines = [
        '+------------------------+',
        '|      GAME  OVER        |',
        '|                        |',
        `|    score: ${String(score).padStart(3, '0')}          |`,
        '|   press R to restart   |',
        '+------------------------+',
      ];
      const startRow = Math.floor((HEIGHT - lines.length) / 2) + 2;
      const startCol = Math.floor((WIDTH - lines[0].length) / 2) + 2;
      lines.forEach((l, i) => {
        term.write(at(startRow + i, startCol) + BOLD + RED + l + RESET);
      });
      drawStatus();
    }

    function splash() {
      term.write(HIDE + CLEAR);
      const art = [
        '',
        '   ████████╗███████╗██████╗ ███╗   ███╗',
        '   ╚══██╔══╝██╔════╝██╔══██╗████╗ ████║',
        '      ██║   █████╗  ██████╔╝██╔████╔██║',
        '      ██║   ██╔══╝  ██╔══██╗██║╚██╔╝██║',
        '      ██║   ███████╗██║  ██║██║ ╚═╝ ██║',
        '      ╚═╝   ╚══════╝╚═╝  ╚═╝╚═╝     ╚═╝',
        '',
        '        S   N   A   K   E',
        '',
        '   ─────────────────────────────────',
        '     방향키 또는 WASD 로 이동',
        '     R 로 재시작',
        '   ─────────────────────────────────',
        '',
        '     press any key to start...',
      ];
      art.forEach((line, i) => {
        const color = i < 7 ? BRIGHT_GREEN : i === 8 ? BOLD + GREEN : i === 15 ? YELLOW : DIM + GREEN;
        term.write(at(2 + i, 4) + color + line + RESET);
      });
    }

    function handleKey(e) {
      const code = e.code;
      const up = code === 'ArrowUp' || code === 'KeyW';
      const down = code === 'ArrowDown' || code === 'KeyS';
      const left = code === 'ArrowLeft' || code === 'KeyA';
      const right = code === 'ArrowRight' || code === 'KeyD';
      const restart = code === 'KeyR';

      if (!up && !down && !left && !right && !restart) return false;

      if (!started || gameOver) {
        if (restart || !started) init();
        return true;
      }

      if (up && dir.y !== 1) nextDir = { x: 0, y: -1 };
      else if (down && dir.y !== -1) nextDir = { x: 0, y: 1 };
      else if (left && dir.x !== 1) nextDir = { x: -1, y: 0 };
      else if (right && dir.x !== -1) nextDir = { x: 1, y: 0 };
      else if (restart) init();
      return true;
    }

    term.attachCustomKeyEventHandler((e) => {
      if (e.type !== 'keydown') return true;
      if (handleKey(e)) {
        e.preventDefault();
        return false;
      }
      return true;
    });

    document.addEventListener('keydown', (e) => {
      if (handleKey(e) && e.code.startsWith('Arrow')) e.preventDefault();
    });

    term.focus();
    splash();
  </script>
</body>
</html>
