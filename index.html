<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Snake :: Pong Ball</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>~/ TERMINAL-SNAKE :: PONG-BALL</h1>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script>
    const term = new Terminal({
      cols: 52,
      rows: 22,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      fontSize: 15,
      cursorBlink: false,
      theme: {
        background: '#000000',
        foreground: '#cccccc',
        cursor: '#00ff00',
      },
    });
    const termEl = document.getElementById('terminal');
    term.open(termEl);

    // ===================== ANSI helpers =====================
    const ESC = '\x1b[';
    const HIDE = ESC + '?25l';
    const CLEAR = ESC + '2J' + ESC + 'H';
    const RESET = ESC + '0m';
    const BOLD = ESC + '1m';
    const DIM = ESC + '2m';
    const GREEN = ESC + '32m';
    const BRIGHT_GREEN = ESC + '92m';
    const RED = ESC + '31m';
    const YELLOW = ESC + '33m';
    const CYAN = ESC + '36m';
    const GRAY = ESC + '90m';
    const WHITE = ESC + '97m';
    const at = (r, c) => ESC + r + ';' + c + 'H';

    // ===================== Snake game =====================
    const WIDTH = 40;
    const HEIGHT = 16;
    const TICK_MS = 110;
    const BIG_FOOD_CHANCE = 0.3;
    const BIG_FOOD_TTL = 90;
    const BIG_FOOD_GROWTH = 5;

    const BOARD_TOP = 3;
    const BOARD_LEFT = 6;
    const STATUS_ROW = BOARD_TOP + HEIGHT + 2;

    let snake, dir, nextDir, food, bigFood, bigFoodTtl, pendingGrowth;
    let score, best = 0, gameOver, started, snakeTimer;
    let speedMult = 1;
    const SPEED_PER_GROWTH = 0.5;

    function randEmptyCell() {
      while (true) {
        const f = {
          x: Math.floor(Math.random() * WIDTH),
          y: Math.floor(Math.random() * HEIGHT),
        };
        const onSnake = snake.some(s => s.x === f.x && s.y === f.y);
        const onFood = food && f.x === food.x && f.y === food.y;
        const onBig = bigFood && f.x === bigFood.x && f.y === bigFood.y;
        if (!onSnake && !onFood && !onBig) return f;
      }
    }

    function cellAt(x, y) {
      return at(BOARD_TOP + 1 + y, BOARD_LEFT + 1 + x);
    }

    function drawBorder() {
      const top = '+' + '-'.repeat(WIDTH) + '+';
      term.write(at(BOARD_TOP, BOARD_LEFT) + GRAY + top + RESET);
      for (let r = 0; r < HEIGHT; r++) {
        term.write(at(BOARD_TOP + 1 + r, BOARD_LEFT) + GRAY + '|' + RESET);
        term.write(at(BOARD_TOP + 1 + r, BOARD_LEFT + WIDTH + 1) + GRAY + '|' + RESET);
      }
      term.write(at(BOARD_TOP + HEIGHT + 1, BOARD_LEFT) + GRAY + top + RESET);
    }

    function clearPlayArea() {
      for (let r = 0; r < HEIGHT; r++) {
        term.write(at(BOARD_TOP + 1 + r, BOARD_LEFT + 1) + ' '.repeat(WIDTH));
      }
    }

    function drawStatus() {
      const bigPart = bigFood ? `  ${YELLOW}BIG:${String(bigFoodTtl).padStart(2, '0')}${RESET}${YELLOW}` : '';
      const speedPart = `  ${CYAN}x${speedMult.toFixed(1)}${RESET}${YELLOW}`;
      const line = ` score:${String(score).padStart(3, '0')}  best:${String(best).padStart(3, '0')}${bigPart}${speedPart}   WASD move   R:restart `;
      term.write(at(STATUS_ROW, 1) + ESC + '2K' + YELLOW + line + RESET);
    }

    function draw() {
      clearPlayArea();
      term.write(cellAt(food.x, food.y) + RED + BOLD + '*' + RESET);
      if (bigFood) {
        const blink = bigFoodTtl <= 20 && bigFoodTtl % 2 === 0;
        const color = blink ? RED + BOLD : YELLOW + BOLD;
        term.write(cellAt(bigFood.x, bigFood.y) + color + 'O' + RESET);
      }
      snake.forEach((s, i) => {
        const ch = i === 0 ? '@' : 'o';
        const color = i === 0 ? BRIGHT_GREEN + BOLD : GREEN;
        term.write(cellAt(s.x, s.y) + color + ch + RESET);
      });
      drawStatus();
    }

    function trySpawnBigFood() {
      if (bigFood) return;
      if (Math.random() < BIG_FOOD_CHANCE) {
        bigFood = randEmptyCell();
        bigFoodTtl = BIG_FOOD_TTL;
      }
    }

    function tick() {
      if (gameOver) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (
        head.x < 0 || head.x >= WIDTH ||
        head.y < 0 || head.y >= HEIGHT ||
        snake.some(s => s.x === head.x && s.y === head.y)
      ) {
        return end();
      }
      if (bigFood) {
        bigFoodTtl--;
        if (bigFoodTtl <= 0) bigFood = null;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > best) best = score;
        food = randEmptyCell();
        trySpawnBigFood();
        bumpSpeed(1);
      } else if (bigFood && head.x === bigFood.x && head.y === bigFood.y) {
        score += BIG_FOOD_GROWTH;
        if (score > best) best = score;
        pendingGrowth += BIG_FOOD_GROWTH - 1;
        bigFood = null;
        bumpSpeed(BIG_FOOD_GROWTH);
      } else if (pendingGrowth > 0) {
        pendingGrowth--;
      } else {
        snake.pop();
      }
      draw();
    }

    function end() {
      gameOver = true;
      clearInterval(snakeTimer);
      const lines = [
        '+------------------------+',
        '|      GAME  OVER        |',
        '|                        |',
        `|    score: ${String(score).padStart(3, '0')}          |`,
        '|   press R to restart   |',
        '+------------------------+',
      ];
      const startRow = BOARD_TOP + Math.floor((HEIGHT - lines.length) / 2) + 1;
      const startCol = BOARD_LEFT + 1 + Math.floor((WIDTH - lines[0].length) / 2);
      lines.forEach((l, i) => {
        term.write(at(startRow + i, startCol) + BOLD + RED + l + RESET);
      });
      drawStatus();
    }

    function initGame() {
      snake = [
        { x: 10, y: Math.floor(HEIGHT / 2) },
        { x: 9, y: Math.floor(HEIGHT / 2) },
        { x: 8, y: Math.floor(HEIGHT / 2) },
      ];
      dir = { x: 1, y: 0 };
      nextDir = dir;
      score = 0;
      pendingGrowth = 0;
      bigFood = null;
      bigFoodTtl = 0;
      gameOver = false;
      started = true;
      food = randEmptyCell();
      speedMult = 1;
      resetBallVelocity();
      term.write(HIDE + CLEAR);
      drawBorder();
      draw();
      if (snakeTimer) clearInterval(snakeTimer);
      snakeTimer = setInterval(tick, TICK_MS);
    }

    function splash() {
      term.write(HIDE + CLEAR);
      const art = [
        '',
        '   +======================================+',
        '   |       T E R M I N A L   S N A K E    |',
        '   |           P O N G   B A L L          |',
        '   +======================================+',
        '',
        '     *  이 터미널 창 전체가 공입니다',
        '     *  벽에 부딪히면 자동으로 튕겨나감',
        '     *  뱀이 길어질수록 공이 빨라져요',
        '',
        '     *  뱀은 W A S D 로 조작',
        '     *  R 로 재시작',
        '',
        '        >>  press any key to start  <<',
      ];
      art.forEach((line, i) => {
        let color = WHITE;
        if (i >= 1 && i <= 4) color = BRIGHT_GREEN + BOLD;
        else if (i >= 6 && i <= 8) color = CYAN;
        else if (i === 10 || i === 11) color = BOLD + GREEN;
        else if (i === 13) color = BOLD + YELLOW;
        term.write(at(2 + i, 4) + color + line + RESET);
      });
    }

    // ===================== Ball physics (terminal element bounces) =====================
    let ballX = 0, ballY = 0;
    let ballVX = 0, ballVY = 0;
    const BASE_VX = 2.4;
    const BASE_VY = 1.8;
    const MAX_V = 28;
    let bounceFlashT = 0;

    function resetBallVelocity() {
      const sx = Math.random() < 0.5 ? -1 : 1;
      const sy = Math.random() < 0.5 ? -1 : 1;
      ballVX = sx * BASE_VX;
      ballVY = sy * BASE_VY;
    }

    function applySpeedMult() {
      const sx = ballVX >= 0 ? 1 : -1;
      const sy = ballVY >= 0 ? 1 : -1;
      ballVX = sx * Math.min(MAX_V, BASE_VX * speedMult);
      ballVY = sy * Math.min(MAX_V, BASE_VY * speedMult);
    }

    function bumpSpeed(lengthGained) {
      speedMult += SPEED_PER_GROWTH * lengthGained;
      applySpeedMult();
    }

    function placeBall() {
      termEl.style.left = ballX + 'px';
      termEl.style.top = ballY + 'px';
    }

    function centerBall() {
      const w = termEl.offsetWidth;
      const h = termEl.offsetHeight;
      ballX = (window.innerWidth - w) / 2;
      ballY = (window.innerHeight - h) / 2;
      placeBall();
    }

    function flashBounce() {
      termEl.classList.add('bounce');
      bounceFlashT = 8;
    }

    function stepBall() {
      const w = termEl.offsetWidth;
      const h = termEl.offsetHeight;
      const maxX = Math.max(0, window.innerWidth - w);
      const maxY = Math.max(0, window.innerHeight - h);

      ballX += ballVX;
      ballY += ballVY;

      let bounced = false;
      if (ballX < 0) { ballX = 0; ballVX = Math.abs(ballVX); bounced = true; }
      else if (ballX > maxX) { ballX = maxX; ballVX = -Math.abs(ballVX); bounced = true; }
      if (ballY < 0) { ballY = 0; ballVY = Math.abs(ballVY); bounced = true; }
      else if (ballY > maxY) { ballY = maxY; ballVY = -Math.abs(ballVY); bounced = true; }

      if (bounced) {
        flashBounce();
      }

      if (bounceFlashT > 0) {
        bounceFlashT--;
        if (bounceFlashT === 0) termEl.classList.remove('bounce');
      }

      placeBall();
      requestAnimationFrame(stepBall);
    }

    window.addEventListener('resize', () => {
      const w = termEl.offsetWidth;
      const h = termEl.offsetHeight;
      ballX = Math.min(Math.max(0, ballX), Math.max(0, window.innerWidth - w));
      ballY = Math.min(Math.max(0, ballY), Math.max(0, window.innerHeight - h));
      placeBall();
    });

    // ===================== Input =====================
    const GAME_KEYS = new Set([
      'KeyW', 'KeyA', 'KeyS', 'KeyD', 'KeyR',
    ]);

    function handleKey(e) {
      const code = e.code;
      if (!GAME_KEYS.has(code)) return true;
      e.preventDefault();
      if (e.stopPropagation) e.stopPropagation();

      if (!started) {
        initGame();
        return false;
      }

      if (code === 'KeyR') {
        initGame();
        return false;
      }

      if (!gameOver) {
        if (code === 'KeyW' && dir.y !== 1) nextDir = { x: 0, y: -1 };
        else if (code === 'KeyS' && dir.y !== -1) nextDir = { x: 0, y: 1 };
        else if (code === 'KeyA' && dir.x !== 1) nextDir = { x: -1, y: 0 };
        else if (code === 'KeyD' && dir.x !== -1) nextDir = { x: 1, y: 0 };
      }
      return false;
    }

    window.addEventListener('keydown', handleKey, { capture: true });
    term.attachCustomKeyEventHandler((e) => {
      if (e.type !== 'keydown') return true;
      return handleKey(e);
    });

    // ===================== Boot =====================
    splash();
    centerBall();
    resetBallVelocity();
    requestAnimationFrame(stepBall);
  </script>
</body>
</html>
